        window.onload = async () => {
            const loadingProgress = document.getElementById('loading-progress');
            const video = document.getElementById('video');
            const preload = document.getElementById('preload');
            const loading = document.getElementById('loading');
            const start = document.getElementById('start');
            const data = document.getElementById('data');

            const memes = [];
            let step = 0;
            let interval = null;

            const setLoadingText = (message) => {
                loading.innerText = message;
                console.error(message);
            };

            const pushInfo = (key, value, suffix = '') => {
                if (value === undefined || value === null) return;
                const text = String(value).trim();
                if (!text) return;
                memes.push(`${key}: ${text}${suffix}`);
            };

            const safeJsonFetch = async (url, fallbackError) => {
                try {
                    const res = await fetch(url);
                    if (!res.ok) {
                        throw new Error(`HTTP ${res.status} for ${url}`);
                    }
                    return await res.json();
                } catch (err) {
                    console.error(`Fetch failed for ${url}`, err);
                    if (fallbackError) setLoadingText(fallbackError);
                    return null;
                }
            };

            const addScreenData = () => {
                pushInfo('Screen Width', screen.width, 'px');
                pushInfo('Screen Height', screen.height, 'px');

                if (screen.width !== window.outerWidth || screen.height !== window.outerHeight) {
                    pushInfo('Window Width', window.outerWidth, 'px');
                    pushInfo('Window Height', window.outerHeight, 'px');
                }

                pushInfo('Display Pixel Depth', screen.pixelDepth);

                if (typeof screen.orientation !== 'undefined' && screen.orientation) {
                    pushInfo('Screen Orientation', screen.orientation.type?.split('-')[0]);
                    pushInfo('Screen Rotation', screen.orientation.angle, ' degrees');
                }
            };

            const addHardwareData = () => {
                pushInfo('CPU Threads', navigator.hardwareConcurrency);

                const memoryLimit = window.performance?.memory?.jsHeapSizeLimit;
                if (typeof memoryLimit !== 'undefined') {
                    pushInfo('Available Browser Memory', Math.round(memoryLimit / 1024 / 1024), 'MB');
                }

                const canvas = document.createElement('canvas');
                let gl = null;
                let debugInfo = null;

                try {
                    gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    debugInfo = gl?.getExtension('WEBGL_debug_renderer_info');
                } catch (err) {
                    console.error('WebGL detection failed', err);
                }

                if (gl && debugInfo) {
                    pushInfo('GPU Vendor', gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL));
                    pushInfo('GPU Info', gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL));
                }
            };

            const basic = await safeJsonFetch(
                'https://wtfismyip.com/json',
                'Basic IP info could not be loaded'
            );

            if (!basic) return;

            loadingProgress.textContent = '97';

            let detailed = null;
            const ip = basic.YourFuckingIPAddress;

            if (ip) {
                // Burada API-ni dəyişdirdik
                detailed = await safeJsonFetch(
                    `https://ipapi.co/${ip}/json/`,
                    'Detailed location info could not be loaded. Disable ad-blocker and refresh.'
                );
            }

            loadingProgress.textContent = '99';

            const detector = new BrowserDetector(window.navigator.userAgent).parseUserAgent();

            // Parametrləri ipapi.co formatına uyğunlaşdırdıq
            pushInfo('IP Address', basic.YourFuckingIPAddress);
            pushInfo('Country', detailed?.country_name);
            pushInfo('Region', detailed?.region);
            pushInfo('City', detailed?.city);
            pushInfo('ZIP Code', detailed?.postal);
            pushInfo('Full Location', basic.YourFuckingLocation);
            pushInfo('Latitude', detailed?.latitude);
            pushInfo('Longitude', detailed?.longitude);
            pushInfo('Timezone', detailed?.timezone);
            pushInfo('Current Time', new Date().toLocaleString());
            pushInfo('ISP', detailed?.org);
            pushInfo('Autonomous System', detailed?.asn);
            pushInfo('Browser Name', detector.name);
            pushInfo('Platform Name', detector.platform);
            pushInfo('Browser Version', detector.version);
            pushInfo('Mobile/Tablet', (detector.isMobile || detector.isTablet) ? 'Yes' : 'No');
            pushInfo('Referrer', document.referrer || 'None');
            pushInfo('System Languages', Array.isArray(navigator.languages) ? navigator.languages.join(', ') : navigator.language);

            addScreenData();
            addHardwareData();

            loadingProgress.textContent = '100';
            loading.style.display = 'none';
            start.style.display = 'flex';
            preload.style.cursor = 'pointer';

            video.oncanplaythrough = () => {
                preload.style.cursor = 'pointer';
            };

            video.onended = () => {
                video.style.display = 'none';
                if (interval) clearInterval(interval);
            };

            preload.onclick = () => {
                if (start.style.display !== 'flex') return;

                preload.style.display = 'none';
                video.play().catch((err) => console.error('Video play failed', err));

                let fontSize = Math.min(window.innerHeight / 12, window.innerWidth / 24);
                fontSize = Math.max(fontSize, 14);
                data.style.fontSize = fontSize + 'px';

                interval = setInterval(() => {
                    const time = video.currentTime - 13.166 - step * 0.5;

                    if (time > 0 && step < memes.length) {
                        if (step === 0) {
                            document.title = 'You just got jammed!';
                            plausible('Jammed');
                        }

                        const el = document.createElement('span');
                        el.textContent = memes[step];
                        data.appendChild(el);

                        while (data.scrollHeight > window.innerHeight && fontSize > 10) {
                            fontSize = fontSize - 1;
                            data.style.fontSize = fontSize + 'px';
                        }

                        step++;
                    }

                    if (step >= memes.length) {
                        clearInterval(interval);
                    }
                }, 30);
            };

            try {
                const response = await fetch('https://husevn.netlify.app/jammin.mp4');
                if (!response.ok || !response.body) {
                    throw new Error(`Video fetch failed with status ${response.status}`);
                }

                const reader = response.body.getReader();
                const contentLength = Number(response.headers.get('Content-Length')) || 0;
                let receivedLength = 0;
                const chunks = [];

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    chunks.push(value);
                    receivedLength += value.length;

                    if (contentLength > 0) {
                        loadingProgress.textContent = String(
                            Math.min(95, Math.floor((receivedLength / contentLength) * 95))
                        );
                    }
                }

                video.src = URL.createObjectURL(new Blob(chunks, { type: 'video/mp4' }));
                video.load();
            } catch (err) {
                console.error('Video preload failed', err);
                setLoadingText('Video could not be loaded');
            }
        };
    </script>

    <style>
        * {
            box-sizing: border-box;
            background: black;
            color: white;
        }

        html, body {
            margin: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            font-family: Arial, Helvetica, sans-serif;
            background: black;
        }

        body,
        #preload,
        #loading,
        #start,
        #data {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #preload,
        #video {
            height: 100vh;
            width: 100vw;
            position: absolute;
            inset: 0;
        }

        #preload,
        #loading,
        #start,
        #data {
            flex-direction: column;
            text-align: center;
        }

        #preload {
            gap: 8px;
            z-index: 2;
            padding: 16px;
        }

        #loading,
        #start {
            background: transparent;
        }

        #data {
            position: relative;
            z-index: 1;
            width: 100vw;
            height: 100vh;
            padding: 16px 20px;
            gap: 6px;
            overflow: hidden;
            align-items: center;
            justify-content: center;
            background: transparent !important;
        }

        #data span {
            display: block;
            width: min(96vw, 1400px);
            max-width: 100%;
            text-align: center;
            overflow-wrap: anywhere;
            word-break: break-word;
            white-space: normal;
            line-height: 1.18;
            background: transparent !important;
        }

        #video {
            background: black;
        }

        .subtitle {
            font-size: 16px;
            line-height: 1.4;
            background: transparent;
        }

        @media only screen and (min-aspect-ratio: 1 / 1) {
            #video {
                object-fit: cover;
            }
        }

        @media only screen and (max-width: 700px) {
            #preload,
            #loading,
            #start {
                font-size: 28px;
            }

            .subtitle {
                font-size: 14px;
            }

            #data {
                padding: 12px;
                gap: 4px;
            }
        }
    </style>
</head>
<body>
    <div id="preload">
        <div id="loading">
            <span>Loading...</span>
            <span class="subtitle"><span id="loading-progress">0</span>%</span>
        </div>
        <div id="start" style="display: none">
            <span>Click to start</span>
        </div>
        <span class="subtitle">Video from the Captain Underpants movie, audio from the game Jetpack Joyride.</span>
        <span class="subtitle">The video experience you're about to see is personalized. Please do not share your screen with anyone while watching.</span>
        <span class="subtitle">Thank you.</span>
    </div>

    <div id="data"></div>
    <video id="video" playsinline style="pointer-events: none"></video>
</body>
